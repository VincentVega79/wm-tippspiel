<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Predictor | WM Tippspiel 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c1020; color: #f3f4f6; font-family: sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="bg-[#0a192f] border-b border-[#d4af37]/30 p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-200 tracking-wider uppercase">
                🏆 World Cup 2026 Tippzettel
            </h1>
            <div class="flex gap-2">
                <button onclick="clearAllTips()" class="bg-red-900/40 hover:bg-red-900/80 text-red-200 text-xs px-3 py-1.5 rounded-xl border border-red-700/30 transition-all">
                    🗑️ Alle Tipps löschen
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl w-full mx-auto p-4 flex-grow">

        <div class="bg-[#111827] border border-slate-800 rounded-2xl p-4 mb-6 flex justify-between items-center shadow-xl">
            <div>
                <span class="text-xs text-gray-400 block uppercase tracking-wider">Spieler / Player</span>
                <span id="player-name-display" class="text-xl font-bold text-white">Gast / Guest</span>
            </div>
            <button onclick="changeName()" class="text-xs bg-slate-800 hover:bg-slate-700 text-gray-300 px-3 py-2 rounded-xl transition-all">
                ✏️ Name ändern
            </button>
        </div>

        <section id="setup-section" class="bg-[#111827] border border-slate-800 rounded-2xl p-6 mb-6 shadow-xl hidden">
            <h2 class="text-xl font-bold mb-2 text-amber-400">Trage deinen Namen ein</h2>
            <p class="text-xs text-gray-400 mb-4">Deine Tipps werden automatisch auf deinem Gerät gespeichert, während du tippst.</p>
            <div class="flex gap-2">
                <input type="text" id="username-input" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white w-full focus:outline-none focus:border-amber-400" placeholder="z.B. Opa Heinz">
                <button onclick="saveUsername()" class="bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-bold px-6 py-3 rounded-xl transition-all">Starten</button>
            </div>
        </section>

        <div class="space-y-6">
            <div id="matches-container" class="space-y-3"></div>
            
            <div class="bg-[#111827] border border-slate-800 rounded-2xl p-6 shadow-xl space-y-4">
                <h3 class="text-lg font-bold text-amber-400">Tipps an Turnierleitung senden</h3>
                <p class="text-xs text-gray-400">Du musst nicht alle Spiele auf einmal tippen. Du kannst auch Teiltipps absenden.</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <button onclick="exportWhatsApp()" class="bg-gradient-to-r from-emerald-600 to-green-600 hover:from-emerald-700 hover:to-green-700 text-white font-bold px-6 py-4 rounded-xl shadow-md transition-all flex flex-col items-center justify-center">
                        <span class="text-base">💬 Per WhatsApp / Messenger</span>
                        <span class="text-[10px] font-normal opacity-80 mt-1">Kopiert den Tipptext direkt in deine Zwischenablage</span>
                    </button>
                    <button onclick="exportMailCSV()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold px-6 py-4 rounded-xl shadow-md transition-all flex flex-col items-center justify-center">
                        <span class="text-base">📧 Per E-Mail (CSV-Format)</span>
                        <span class="text-[10px] font-normal opacity-80 mt-1">Öffnet deine Mail-App mit den strukturierten Daten</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
    let currentUser = localStorage.getItem('wc_user_v2') || '';

    const teamNames = {
        "MEX": "Mexiko", "RSA": "Südafrika", "KOR": "Südkorea", "CZE": "Tschechien",
        "CAN": "Kanada", "BIH": "Bosnien", "QAT": "Katar", "SUI": "Schweiz",
        "BRA": "Brasilien", "MAR": "Marokko", "HAI": "Haiti", "SCO": "Schottland",
        "USA": "USA", "PAR": "Paraguay", "AUS": "Australien", "TUR": "Türkei",
        "GER": "Deutschland", "CUW": "Curaçao", "CIV": "Elfenbeinküste", "ECU": "Ecuador",
        "NED": "Niederlande", "JPN": "Japan", "SWE": "Schweden", "TUN": "Tunesien",
        "BEL": "Belgien", "EGY": "Ägypten", "IRN": "Iran", "NZL": "Neuseeland",
        "ESP": "Spanien", "CPV": "Kap Verde", "KSA": "Saudi-Arabien", "URU": "Uruguay",
        "FRA": "Frankreich", "SEN": "Senegal", "IRQ": "Irak", "NOR": "Norwegen",
        "ARG": "Argentinien", "ALG": "Algerien", "AUT": "Österreich", "JOR": "Jordanien",
        "POR": "Portugal", "COD": "DR Kongo", "UZB": "Usbekistan", "COL": "Kolumbien",
        "ENG": "England", "CRO": "Kroatien", "GHA": "Ghana", "PAN": "Panama"
    };

    let matches = [
        { id:"match_1", team1:"MEX", team2:"RSA", label:"Gruppe A", date:"11.06", time:"21:00" },
        { id:"match_2", team1:"KOR", team2:"CZE", label:"Gruppe A", date:"12.06", time:"04:00" },
        { id:"match_3", team1:"MEX", team2:"KOR", label:"Gruppe A", date:"19.06", time:"03:00" },
        { id:"match_4", team1:"CZE", team2:"RSA", label:"Gruppe A", date:"18.06", time:"18:00" },
        { id:"match_5", team1:"CAN", team2:"BIH", label:"Gruppe B", date:"12.06", time:"21:00" },
        { id:"match_6", team1:"QAT", team2:"SUI", label:"Gruppe B", date:"13.06", time:"21:00" },
        { id:"match_7", team1:"SUI", team2:"BIH", label:"Gruppe B", date:"18.06", time:"21:00" },
        { id:"match_8", team1:"CAN", team2:"QAT", label:"Gruppe B", date:"19.06", time:"00:00" },
        { id:"match_9", team1:"BRA", team2:"MAR", label:"Gruppe C", date:"14.06", time:"00:00" },
        { id:"match_10", team1:"HAI", team2:"SCO", label:"Gruppe C", date:"14.06", time:"03:00" },
        { id:"match_11", team1:"SCO", team2:"MAR", label:"Gruppe C", date:"20.06", time:"00:00" },
        { id:"match_12", team1:"BRA", team2:"HAI", label:"Gruppe C", date:"20.06", time:"02:30" },
        { id:"match_13", team1:"USA", team2:"PAR", label:"Gruppe D", date:"13.06", time:"03:00" },
        { id:"match_14", team1:"AUS", team2:"TUR", label:"Gruppe D", date:"14.06", time:"06:00" },
        { id:"match_15", team1:"USA", team2:"AUS", label:"Gruppe D", date:"19.06", time:"21:00" },
        { id:"match_16", team1:"TUR", team2:"PAR", label:"Gruppe D", date:"20.06", time:"05:00" },
        { id:"match_17", team1:"GER", team2:"CUW", label:"Gruppe E", date:"14.06", time:"19:00" },
        { id:"match_18", team1:"CIV", team2:"ECU", label:"Gruppe E", date:"15.06", time:"01:00" },
        { id:"match_19", team1:"GER", team2:"CIV", label:"Gruppe E", date:"20.06", time:"22:00" },
        { id:"match_20", team1:"ECU", team2:"CUW", label:"Gruppe E", date:"21.06", time:"02:00" },
        { id:"match_21", team1:"NED", team2:"JPN", label:"Gruppe F", date:"14.06", time:"22:00" },
        { id:"match_22", team1:"SWE", team2:"TUN", label:"Gruppe F", date:"15.06", time:"04:00" },
        { id:"match_23", team1:"NED", team2:"SWE", label:"Gruppe F", date:"20.06", time:"19:00" },
        { id:"match_24", team1:"TUN", team2:"JPN", label:"Gruppe F", date:"21.06", time:"06:00" },
        { id:"match_25", team1:"BEL", team2:"EGY", label:"Gruppe G", date:"15.06", time:"21:00" },
        { id:"match_26", team1:"IRN", team2:"NZL", label:"Gruppe G", date:"16.06", time:"03:00" },
        { id:"match_27", team1:"BEL", team2:"IRN", label:"Gruppe G", date:"21.06", time:"21:00" },
        { id:"match_28", team1:"NZL", team2:"EGY", label:"Gruppe G", date:"22.06", time:"03:00" },
        { id:"match_29", team1:"ESP", team2:"CPV", label:"Gruppe H", date:"15.06", time:"18:00" },
        { id:"match_30", team1:"KSA", team2:"URU", label:"Gruppe H", date:"16.06", time:"00:00" },
        { id:"match_31", team1:"ESP", team2:"KSA", label:"Gruppe H", date:"21.06", time:"18:00" },
        { id:"match_32", team1:"URU", team2:"CPV", label:"Gruppe H", date:"22.06", time:"00:00" }
    ];

    const rest = ["FRA", "SEN", "IRQ", "NOR", "ARG", "ALG", "AUT", "JOR", "POR", "COD", "UZB", "COL", "ENG", "CRO", "GHA", "PAN"];
    for (let i = 33; i <= 72; i++) {
        let idx1 = (i - 33) % rest.length; let idx2 = (i - 32) % rest.length;
        matches.push({ id: `match_${i}`, team1: rest[idx1], team2: rest[idx2], label: `Spiel ${i}`, date: "25.06", time: "20:00" });
    }

    function getTips() { return JSON.parse(localStorage.getItem('wc_v2_' + currentUser)) || {}; }

    function saveTip(mId, side, val) {
        if (!currentUser) return;
        const tips = getTips();
        if (!tips[mId]) tips[mId] = { home: '', away: '' };
        tips[mId][side] = val !== '' ? parseInt(val) : '';
        localStorage.setItem('wc_v2_' + currentUser, JSON.stringify(tips));
    }

    function renderMatches() {
        const container = document.getElementById('matches-container');
        if (!container) return; container.innerHTML = '';
        const tips = getTips();

        matches.forEach(m => {
            const t = tips[m.id] || { home: '', away: '' };
            container.innerHTML += `
                <div class="bg-[#111827] border border-slate-800 rounded-xl p-4 flex items-center justify-between gap-4 shadow-sm">
                    <div class="flex flex-col text-left">
                        <div class="flex items-center gap-2"><span class="text-xs text-amber-500 font-mono">${m.label}</span><span class="text-[10px] text-gray-500">📅 ${m.date} - ${m.time}</span></div>
                        <div class="text-sm font-bold text-gray-200 mt-1">${teamNames[m.team1] || m.team1} vs ${teamNames[m.team2] || m.team2}</div>
                    </div>
                    <div class="flex items-center gap-1 shrink-0">
                        <input type="number" min="0" max="99" value="${t.home !== '' && t.home !== undefined ? t.home : ''}" oninput="saveTip('${m.id}', 'home', this.value)" class="w-10 bg-slate-900 border border-slate-700 rounded-lg py-1 text-center font-bold text-white focus:border-amber-400 focus:outline-none">
                        <span class="text-gray-600">:</span>
                        <input type="number" min="0" max="99" value="${t.away !== '' && t.away !== undefined ? t.away : ''}" oninput="saveTip('${m.id}', 'away', this.value)" class="w-10 bg-slate-900 border border-slate-700 rounded-lg py-1 text-center font-bold text-white focus:border-amber-400 focus:outline-none">
                    </div>
                </div>`;
        });
    }

    function exportWhatsApp() {
        if (!currentUser) { alert("Bitte trag zuerst deinen Namen ein!"); return; }
        const tips = getTips(); let text = `🏆 WM-Tipps von ${currentUser}:\n`; let count = 0;
        matches.forEach(m => {
            const t = tips[m.id];
            if (t && t.home !== '' && t.away !== '' && t.home !== undefined && t.away !== undefined) {
                text += `${m.id.replace('match_', '')}: ${m.team1}-${m.team2} [${t.home}:${t.away}]\n`; count++;
            }
        });
        if(count === 0) { alert("Du hast noch keine Spiele getippt!"); return; }
        navigator.clipboard.writeText(text).then(() => { alert("📋 Tippzettel in Zwischenablage kopiert! Öffne WhatsApp und füge den Text ein."); });
    }

    function exportMailCSV() {
        if (!currentUser) { alert("Bitte trag zuerst deinen Namen ein!"); return; }
        const tips = getTips(); let csv = "Spieler;Spiel;Heim;Gast;TippHeim;TippGast\n"; let count = 0;
        matches.forEach(m => {
            const t = tips[m.id];
            if (t && (t.home !== '' || t.away !== '') && t.home !== undefined && t.away !== undefined) {
                csv += `${currentUser};${m.id};${m.team1};${m.team2};${t.home};${t.away}\n`; count++;
            }
        });
        if(count === 0) { alert("Du hast noch keine Spiele getippt!"); return; }
        window.location.href = `mailto:?subject=${encodeURIComponent('WM Tipps von ' + currentUser)}&body=${encodeURIComponent('Hier sind meine Tippdaten:\n\n' + csv)}`;
    }

    function saveUsername() {
        const input = document.getElementById('username-input').value.trim();
        if (!input) return; currentUser = input;
        localStorage.setItem('wc_user_v2', currentUser);
        document.getElementById('player-name-display').textContent = currentUser;
        document.getElementById('setup-section').classList.add('hidden');
        renderMatches();
    }

    function changeName() {
        document.getElementById('setup-section').classList.remove('hidden');
        document.getElementById('username-input').focus();
    }

    function clearAllTips() {
        if (confirm("Möchtest du wirklich alle deine eingetragenen Tipps auf diesem Gerät löschen?")) {
            localStorage.removeItem('wc_v2_' + currentUser); renderMatches();
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        if (currentUser) {
            document.getElementById('player-name-display').textContent = currentUser;
        } else {
            document.getElementById('setup-section').classList.remove('hidden');
        }
        renderMatches();
    });
    </script>
</body>
</html>
