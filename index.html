<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Predictor | WM Tippspiel 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0c1020;
            color: #f3f4f6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="bg-[#0a192f] border-b border-[#d4af37]/30 p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-200 tracking-wider uppercase">
                &#127942; World Cup 2026
            </h1>
            <div class="flex items-center gap-3">
                <button onclick="switchLang('de')" id="btn-de" class="px-2 py-1 rounded text-xs font-bold bg-amber-500 text-black">DE</button>
                <button onclick="switchLang('en')" id="btn-en" class="px-2 py-1 rounded text-xs font-bold bg-slate-700 text-white">EN</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl w-full mx-auto p-4 flex-grow">

        <div id="loading-overlay" class="bg-amber-500/10 border border-amber-500/30 rounded-xl p-3 mb-4 flex items-center justify-center gap-3 text-amber-400 text-xs font-mono hidden">
            <div class="animate-spin rounded-full h-4 w-4 border-t-2 border-b-2 border-amber-400"></div>
            <span id="loading-text">Synchronisiere Spieldaten...</span>
        </div>

        <div class="bg-[#111827] border border-slate-800 rounded-2xl p-4 mb-6 flex flex-wrap justify-between items-center gap-4 shadow-xl">
            <div>
                <span class="text-xs text-gray-400 block uppercase tracking-wider" id="label-player">Spieler</span>
                <span id="player-name-display" class="text-xl font-bold text-white">Gast / Guest</span>
            </div>
            <div class="flex gap-2">
                <button onclick="showTab('tab-matches')" id="nav-matches" class="px-4 py-2 rounded-xl text-sm font-bold bg-amber-500 text-slate-950 transition-all">&#9917; Tipps</button>
                <button onclick="showTab('tab-ranking')" id="nav-ranking" class="px-4 py-2 rounded-xl text-sm font-medium bg-slate-800 text-gray-300 transition-all">&#128202; Ranking</button>
                <button onclick="showTab('tab-admin')" id="nav-admin" class="px-4 py-2 rounded-xl text-sm font-medium bg-red-950 text-red-200 hidden">&#9881;&#65039; Admin</button>
            </div>
        </div>

        <!-- Setup / Name-Eingabe -->
        <section id="setup-section" class="bg-[#111827] border border-slate-800 rounded-2xl p-6 mb-6 shadow-xl hidden">
            <h2 class="text-2xl font-semibold mb-2 text-amber-400" id="setup-title">Willkommen zum Familien-Tippspiel!</h2>
            <p class="text-sm text-gray-400 mb-4" id="setup-desc">Bitte gib deinen Namen ein. Deine Tipps werden zentral gespeichert.</p>
            <div class="flex gap-2">
                <input type="text" id="username-input" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white w-full focus:outline-none focus:border-amber-400" placeholder="z.B. Opa Heinz">
                <button onclick="saveUsername()" id="setup-btn" class="bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-bold px-6 py-3 rounded-xl transition-all whitespace-nowrap">Starten</button>
            </div>
        </section>

        <!-- Tab: Tipps -->
        <div id="tab-matches" class="tab-content space-y-6">
            <div class="flex gap-2 overflow-x-auto pb-2 border-b border-slate-800">
                <button onclick="filterPhase('group')" id="phase-group" class="border border-amber-500/50 bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium shrink-0">Hauptrunde (72 Spiele)</button>
                <button onclick="filterPhase('ko')" id="phase-ko" class="opacity-50 pointer-events-none border border-slate-700 text-gray-400 px-4 py-2 rounded-lg text-sm font-medium shrink-0">&#128274; Endrunde</button>
            </div>
            <div id="matches-container" class="space-y-3"></div>
            <div class="text-center pt-4">
                <button onclick="saveUserTipsServer()" id="submit-btn" class="bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white font-bold px-8 py-4 rounded-xl shadow-lg transition-all w-full md:w-auto">&#128190; Tipps abschicken</button>
            </div>
        </div>

        <!-- Tab: Ranking -->
        <div id="tab-ranking" class="tab-content hidden p-1">
            <div class="bg-[#111827] border border-slate-800 rounded-2xl p-6 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-amber-400" id="ranking-title">&#127942; Live-Rangliste</h3>
                    <button onclick="loadDataFromServer()" class="text-xs bg-slate-800 hover:bg-slate-700 text-gray-300 px-3 py-1 rounded-lg transition-all" id="refresh-btn">&#128260; Aktualisieren</button>
                </div>
                <div class="overflow-x-auto">
                    <div class="w-full text-center py-4 text-gray-500 text-sm hidden" id="no-players-msg">Noch keine Tipps eingetragen. / No tips submitted yet.</div>
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-800 text-gray-400 text-sm">
                                <th class="py-3 px-4 w-16 text-center">#</th>
                                <th class="py-3 px-4 text-left" id="th-name">Name</th>
                                <th class="py-3 px-4 text-center" id="th-points">Punkte</th>
                            </tr>
                        </thead>
                        <tbody id="ranking-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Tab: Admin -->
        <div id="tab-admin" class="tab-content hidden space-y-4">
            <div class="bg-red-950/20 border border-red-900/50 rounded-2xl p-6 shadow-xl">
                <h3 class="text-xl font-bold mb-4 text-red-400">&#9881;&#65039; Admin-Zentrale</h3>
                <div class="mb-4 flex items-center justify-between bg-slate-900 p-3 rounded-xl border border-slate-800">
                    <span class="text-sm text-gray-300">Status Endrunde:</span>
                    <button onclick="toggleEndrundeAdmin()" id="admin-ko-status-btn" class="bg-red-700 text-white text-xs px-3 py-2 rounded-lg font-bold">Gesperrt</button>
                </div>
                <div id="admin-matches-container" class="space-y-2 max-h-[32rem] overflow-y-auto pr-2"></div>
                <button onclick="saveAdminResultsServer()" class="mt-4 bg-gradient-to-r from-red-700 to-red-600 text-white font-bold px-4 py-3 rounded-xl w-full shadow-lg">Echte Ergebnisse speichern</button>
            </div>
        </div>

    </main>

    function showLoading(show, text) {
        const el = document.getElementById('loading-overlay');

        if (el) el.classList[show ? 'remove' : 'add']('hidden');
        if (tx && text) tx.textContent = text;

    function calculatePoints(th, ta, rh, ra) {
        if (th === '' || ta === '' || th == null || ta == null) return 0;
        if (rh == null || ra == null || rh === '' || ra === '') return 0;
        const tH = parseInt(th), tA = parseInt(ta), rH = parseInt(rh), rA = parseInt(ra);
        if (isNaN(tH) || isNaN(tA) || isNaN(rH) || isNaN(rA)) return 0;
        if (tH === rH && tA === rA) return 2;
        const tipDiff  = tH - tA;
        const realDiff = rH - rA;
        if (tipDiff === realDiff) return 1;
        if ((tH > tA && rH > rA) || (tH < tA && rH < rA) || (tH === tA && rH === rA)) return 1;
        return 0;
    }

    function getUserTips() {
        // Server hat Vorrang; Fallback auf lokalen Cache
        if (currentUser && serverData.allPlayersData && serverData.allPlayersData[currentUser]) {
            return serverData.allPlayersData[currentUser];
        }
        return JSON.parse(localStorage.getItem('wc_tips_' + currentUser)) || {};
    }

    function saveLocalTip(matchId, side, value) {
        if (!currentUser) return;
        const key = 'wc_tips_' + currentUser;
        const cache = JSON.parse(localStorage.getItem(key)) || {};
        if (!cache[matchId]) cache[matchId] = { home: '', away: '' };
        cache[matchId][side] = (value !== '') ? parseInt(value) : '';
        localStorage.setItem(key, JSON.stringify(cache));
    }

    function renderRanking() {
        const tbody = document.getElementById('ranking-table-body');
        const msg   = document.getElementById('no-players-msg');
        if (!tbody) return;
        tbody.innerHTML = '';

        const players = serverData.allPlayersData || {};
        const real    = serverData.echteErgebnisse || {};
        const leaderboard = [];

        Object.keys(players).forEach(name => {
            let pts = 0;
            const preds = players[name];
            Object.keys(preds).forEach(mId => {
                if (real[mId]) {
                    pts += calculatePoints(preds[mId].home, preds[mId].away, real[mId].home, real[mId].away);
                }
            });
            leaderboard.push({ name, points: pts });
        });

        if (leaderboard.length === 0) {
            if (msg) msg.classList.remove('hidden');
            return;
        }
        if (msg) msg.classList.add('hidden');

        leaderboard.sort((a, b) => b.points - a.points);
        leaderboard.forEach((p, idx) => {
            const medal = idx === 0 ? '\u1F947' : idx === 1 ? '\u1F948' : idx === 2 ? '\u1F949' : `${idx + 1}.`;
            const isMe  = p.name === currentUser;
            tbody.innerHTML += `
                <tr class="border-b border-slate-800 text-sm hover:bg-slate-900/50 ${isMe ? 'bg-amber-500/5' : ''}">
                    <td class="py-3 px-4 font-bold text-center ${idx === 0 ? 'text-amber-400' : ''}">${medal}</td>
                    <td class="py-3 px-4 font-medium">${p.name}${isMe ? ' <span class="text-amber-400 text-xs">(Du)</span>' : ''}</td>
                    <td class="py-3 px-4 font-bold text-emerald-400 text-center">${p.points} Pts</td>
                </tr>`;
        });
    }

    // jsonstorage.net: GET ohne Auth, PUT ohne Auth, CORS \u00FCberall frei
    async function loadDataFromServer() {
        showLoading(true, currentLang === 'de' ? 'Synchronisiere Spieldaten\u2026' : 'Syncing data\u2026');
        try {
            const res = await fetch(`${API_URL}?apiKey=${API_KEY}`);
            if (res.ok) {
                const data = await res.json();
                if (data) {
                    serverData = data;
                    if (!serverData.allPlayersData)  serverData.allPlayersData  = {};
                    if (!serverData.echteErgebnisse) serverData.echteErgebnisse = {};

                    if (currentUser && serverData.allPlayersData[currentUser]) {
                        localStorage.setItem('wc_tips_' + currentUser, JSON.stringify(serverData.allPlayersData[currentUser]));
                    }
                }
            } else {
                console.warn('Storage GET Status:', res.status);
            }
        } catch (e) {
            console.warn('Cloud-Sync fehlgeschlagen:', e);
        }
        updateUIPhases();
        renderMatches();
        renderRanking();
        if (isAdminMode) renderAdminMatches();
        showLoading(false);
    }

    // \u2500\u2500\u2500 SERVER: DATEN SCHREIBEN (PUT) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
    async function putToServer(payload) {
        const res = await fetch(`${API_URL}?apiKey=${API_KEY}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!res.ok) {
            const txt = await res.text();
            console.error('Storage PUT Fehler:', res.status, txt);
            throw new Error('PUT ' + res.status);
        }
        return res;
    }

    // \u2500\u2500\u2500 SERVER: TIPPS SENDEN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
    async function saveUserTipsServer() {
        if (!currentUser) {
            alert(currentLang === 'de' ? 'Bitte trag zuerst deinen Namen ein!' : 'Please enter your name first!');
            return;
        }
        showLoading(true, currentLang === 'de' ? 'Speichere Tipps in der Cloud\u2026' : 'Saving predictions\u2026');

        const localTips = JSON.parse(localStorage.getItem('wc_tips_' + currentUser)) || {};

        try {
            // Frische Daten laden, dann mergen (verhindert \u00DCberschreiben anderer User)
            const freshRes = await fetch(`${API_URL}?apiKey=${API_KEY}`);
            if (freshRes.ok) {
                const fresh = await freshRes.json();
                if (fresh) {
                    serverData = fresh;
                    if (!serverData.allPlayersData)  serverData.allPlayersData  = {};
                    if (!serverData.echteErgebnisse) serverData.echteErgebnisse = {};
                }
            }

            serverData.allPlayersData[currentUser] = localTips;
            await putToServer(serverData);

            alert(currentLang === 'de'
                ? '\u1F389 Deine Tipps wurden erfolgreich gespeichert!'
                : '\u1F389 Your predictions have been saved!');
            await loadDataFromServer();
        } catch (err) {
            alert(currentLang === 'de'
                ? '\u26A0\uFE0F Fehler beim \u00DCbertragen. Tipps sind lokal gesichert.'
                : '\u26A0\uFE0F Upload failed. Tips are saved locally.');
        }
        showLoading(false);
    }

    // \u2500\u2500\u2500 SERVER: ADMIN-ERGEBNISSE SPEICHERN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
    async function saveAdminResultsServer() {
        showLoading(true, 'Speichere offizielle Ergebnisse\u2026');
        const echte = {};
        matches.forEach(m => {
            const h = document.getElementById(`admin-${m.id}-home`);
            const a = document.getElementById(`admin-${m.id}-away`);
            if (h && a && h.value !== '' && a.value !== '') {
                echte[m.id] = { home: parseInt(h.value), away: parseInt(a.value) };
            }
        });
        serverData.echteErgebnisse = echte;

        try {
            await putToServer(serverData);
            alert('\u2705 Admin-Daten erfolgreich gespeichert!');
            await loadDataFromServer();
        } catch (e) {
            alert('\u274C Fehler beim Speichern. Pr\u00FCfe ob API_URL korrekt eingetragen ist.');
        }
        showLoading(false);
    }

    // \u2500\u2500\u2500 USERNAME \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
    function saveUsername() {
        const input = document.getElementById('username-input').value.trim();
        if (!input) return;
        currentUser = input;
        localStorage.setItem('wc_user', currentUser);
        document.getElementById('player-name-display').textContent = currentUser;
        document.getElementById('setup-section').classList.add('hidden');
        loadDataFromServer();
    }

    // \u2500\u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
    window.addEventListener('DOMContentLoaded', () => {
        // Admin-Modus via URL-Parameter
        const params = new URLSearchParams(window.location.search);
        isAdminMode = params.get('mode') === 'admin';
        if (isAdminMode) {
            document.getElementById('nav-admin').classList.remove('hidden');
        }

        // User-Status
        if (currentUser) {
            document.getElementById('player-name-display').textContent = currentUser;
            document.getElementById('setup-section').classList.add('hidden');
        } else {
            document.getElementById('setup-section').classList.remove('hidden');
        }

        // Sprache initialisieren
        switchLang(currentLang);

        // Lokal sofort rendern (kein Flackern)
        renderMatches();
        showTab('tab-matches');

        // Im Hintergrund vom Server synchronisieren
        loadDataFromServer();
    });
    </script>
</body>
</html>
