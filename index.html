<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Predictor | WM Tippspiel 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0c1020;
            color: #f3f4f6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="bg-[#0a192f] border-b border-[#d4af37]/30 p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-200 tracking-wider uppercase">
                🏆 World Cup 2026
            </h1>
            <div class="flex items-center gap-3">
                <button onclick="switchLang('de')" id="btn-de" class="px-2 py-1 rounded text-xs font-bold transition-all bg-amber-500 text-black">DE</button>
                <button onclick="switchLang('en')" id="btn-en" class="px-2 py-1 rounded text-xs font-bold transition-all bg-slate-700 text-white">EN</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl w-full mx-auto p-4 flex-grow">

        <div class="bg-[#111827] border border-slate-800 rounded-2xl p-4 mb-6 flex flex-wrap justify-between items-center gap-4 shadow-xl">
            <div>
                <span class="text-xs text-gray-400 block uppercase tracking-wider" id="label-player">Spieler</span>
                <span id="player-name-display" class="text-xl font-bold text-white">Gast / Guest</span>
            </div>
            <div class="flex gap-2">
                <button onclick="showTab('tab-matches')" id="nav-matches" class="px-4 py-2 rounded-xl text-sm font-bold bg-amber-500 text-slate-950 transition-all">⚽ Tipps</button>
            </div>
        </div>

        <section id="setup-section" class="bg-[#111827] border border-slate-800 rounded-2xl p-6 mb-6 shadow-xl hidden">
            <h2 class="text-2xl font-semibold mb-2 text-amber-400" id="setup-title">Willkommen zum Familien-Tippspiel!</h2>
            <p class="text-sm text-gray-400 mb-4" id="setup-desc">Bitte gib deinen Namen ein. Deine Tipps werden lokal auf deinem Gerät gesichert.</p>
            <div class="flex gap-2">
                <input type="text" id="username-input" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white w-full focus:outline-none focus:border-amber-400" placeholder="z.B. Opa Heinz">
                <button onclick="saveUsername()" id="setup-btn" class="bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-bold px-6 py-3 rounded-xl transition-all whitespace-nowrap">Starten</button>
            </div>
        </section>

        <div id="tab-matches" class="tab-content space-y-6">
            <div id="matches-container" class="space-y-3"></div>
            
            <div class="bg-[#111827] border border-slate-800 rounded-2xl p-6 shadow-xl space-y-4">
                <h3 class="text-lg font-bold text-amber-400">Tipps versenden</h3>
                <p class="text-xs text-gray-400">Wähle aus, wie du deine Tipps an die Turnierleitung übermitteln möchtest:</p>
                
                <div class="flex flex-col sm:flex-row gap-3">
                    <button onclick="exportAsMessenger()" class="flex-1 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold px-6 py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                        💬 Für Messenger kopieren (WhatsApp...)
                    </button>
                    <button onclick="exportAsCSV()" class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold px-6 py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                        📧 Als E-Mail / CSV-Datei senden
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
    let currentLang = localStorage.getItem('wc_lang') || 'de';
    let currentUser = localStorage.getItem('wc_user') || '';
    let currentFilterPhase = 'group';

    const teamNames = {
        "MEX": { de: "Mexiko", en: "Mexico" }, "RSA": { de: "Südafrika", en: "South Africa" },
        "KOR": { de: "Südkorea", en: "South Korea" }, "CZE": { de: "Tschechien", en: "Czechia" },
        "CAN": { de: "Kanada", en: "Canada" }, "BIH": { de: "Bosnien", en: "Bosnia" },
        "QAT": { de: "Katar", en: "Qatar" }, "SUI": { de: "Schweiz", en: "Switzerland" },
        "BRA": { de: "Brasilien", en: "Brazil" }, "MAR": { de: "Marokko", en: "Morocco" },
        "HAI": { de: "Haiti", en: "Haiti" }, "SCO": { de: "Schottland", en: "Scotland" },
        "USA": { de: "USA", en: "USA" }, "PAR": { de: "Paraguay", en: "Paraguay" },
        "AUS": { de: "Australien", en: "Australia" }, "TUR": { de: "Türkei", en: "Turkey" },
        "GER": { de: "Deutschland", en: "Germany" }, "CUW": { de: "Curaçao", en: "Curaçao" },
        "CIV": { de: "Elfenbeinküste", en: "Ivory Coast" }, "ECU": { de: "Ecuador", en: "Ecuador" },
        "NED": { de: "Niederlande", en: "Netherlands" }, "JPN": { de: "Japan", en: "Japan" },
        "SWE": { de: "Schweden", en: "Sweden" }, "TUN": { de: "Tunesien", en: "Tunisia" },
        "BEL": { de: "Belgien", en: "Belgium" }, "EGY": { de: "Ägypten", en: "Egypt" },
        "IRN": { de: "Iran", en: "Iran" }, "NZL": { de: "Neuseeland", en: "New Zealand" },
        "ESP": { de: "Spanien",  en: "Spain" }, "CPV": { de: "Kap Verde", en: "Cape Verde" },
        "KSA": { de: "Saudi-Arabien", en: "Saudi Arabia" }, "URU": { de: "Uruguay", en: "Uruguay" },
        "FRA": { de: "Frankreich", en: "France" }, "SEN": { de: "Senegal", en: "Senegal" },
        "IRQ": { de: "Irak", en: "Iraq" }, "NOR": { de: "Norwegen", en: "Norway" },
        "ARG": { de: "Argentinien", en: "Argentina" }, "ALG": { de: "Algerien", en: "Algeria" },
        "AUT": { de: "Österreich", en: "Austria" }, "JOR": { de: "Jordanien", en: "Jordan" },
        "POR": { de: "Portugal", en: "Portugal" }, "COD": { de: "DR Kongo", en: "DR Congo" },
        "UZB": { de: "Usbekistan", en: "Uzbekistan" }, "COL": { de: "Kolumbien", en: "Colombia" },
        "ENG": { de: "England", en: "England" }, "CRO": { de: "Kroatien", en: "Croatia" },
        "GHA": { de: "Ghana", en: "Ghana" }, "PAN": { de: "Panama", en: "Panama" }
    };

    function getTeamName(code) {
        if (!code || !teamNames[code]) return code || '?';
        return teamNames[code][currentLang] || teamNames[code]['de'] || code;
    }

    let matches = [
        { id:"match_1",  type:"group", team1:"MEX", team2:"RSA", labelDe:"Gruppe A", labelEn:"Group A", date:"11.06.2026", time:"21:00" },
        { id:"match_2",  type:"group", team1:"KOR", team2:"CZE", labelDe:"Gruppe A", labelEn:"Group A", date:"12.06.2026", time:"04:00" },
        { id:"match_3",  type:"group", team1:"MEX", team2:"KOR", labelDe:"Gruppe A", labelEn:"Group A", date:"19.06.2026", time:"03:00" },
        { id:"match_4",  type:"group", team1:"CZE", team2:"RSA", labelDe:"Gruppe A", labelEn:"Group A", date:"18.06.2026", time:"18:00" },
        { id:"match_5",  type:"group", team1:"CAN", team2:"BIH", labelDe:"Gruppe B", labelEn:"Group B", date:"12.06.2026", time:"21:00" },
        { id:"match_6",  type:"group", team1:"QAT", team2:"SUI", labelDe:"Gruppe B", labelEn:"Group B", date:"13.06.2026", time:"21:00" },
        { id:"match_7",  type:"group", team1:"SUI", team2:"BIH", labelDe:"Gruppe B", labelEn:"Group B", date:"18.06.2026", time:"21:00" },
        { id:"match_8",  type:"group", team1:"CAN", team2:"QAT", labelDe:"Gruppe B", labelEn:"Group B", date:"19.06.2026", time:"00:00" },
        { id:"match_9",  type:"group", team1:"BRA", team2:"MAR", labelDe:"Gruppe C", labelEn:"Group C", date:"14.06.2026", time:"00:00" },
        { id:"match_10", type:"group", team1:"HAI", team2:"SCO", labelDe:"Gruppe C", labelEn:"Group C", date:"14.06.2026", time:"03:00" },
        { id:"match_11", type:"group", team1:"SCO", team2:"MAR", labelDe:"Gruppe C", labelEn:"Group C", date:"20.06.2026", time:"00:00" },
        { id:"match_12", type:"group", team1:"BRA", team2:"HAI", labelDe:"Gruppe C", labelEn:"Group C", date:"20.06.2026", time:"02:30" },
        { id:"match_13", type:"group", team1:"USA", team2:"PAR", labelDe:"Gruppe D", labelEn:"Group D", date:"13.06.2026", time:"03:00" },
        { id:"match_14", type:"group", team1:"AUS", team2:"TUR", labelDe:"Gruppe D", labelEn:"Group D", date:"14.06.2026", time:"06:00" },
        { id:"match_15", type:"group", team1:"USA", team2:"AUS", labelDe:"Gruppe D", labelEn:"Group D", date:"19.06.2026", time:"21:00" },
        { id:"match_16", type:"group", team1:"TUR", team2:"PAR", labelDe:"Gruppe D", labelEn:"Group D", date:"20.06.2026", time:"05:00" },
        { id:"match_17", type:"group", team1:"GER", team2:"CUW", labelDe:"Gruppe E", labelEn:"Group E", date:"14.06.2026", time:"19:00" },
        { id:"match_18", type:"group", team1:"CIV", team2:"ECU", labelDe:"Gruppe E", labelEn:"Group E", date:"15.06.2026", time:"01:00" },
        { id:"match_19", type:"group", team1:"GER", team2:"CIV", labelDe:"Gruppe E", labelEn:"Group E", date:"20.06.2026", time:"22:00" },
        { id:"match_20", type:"group", team1:"ECU", team2:"CUW", labelDe:"Gruppe E", labelEn:"Group E", date:"21.06.2026", time:"02:00" },
        { id:"match_21", type:"group", team1:"NED", team2:"JPN", labelDe:"Gruppe F", labelEn:"Group F", date:"14.06.2026", time:"22:00" },
        { id:"match_22", type:"group", team1:"SWE", team2:"TUN", labelDe:"Gruppe F", labelEn:"Group F", date:"15.06.2026", time:"04:00" },
        { id:"match_23", type:"group", team1:"NED", team2:"SWE", labelDe:"Gruppe F", labelEn:"Group F", date:"20.06.2026", time:"19:00" },
        { id:"match_24", type:"group", team1:"TUN", team2:"JPN", labelDe:"Gruppe F", labelEn:"Group F", date:"21.06.2026", time:"06:00" },
        { id:"match_25", type:"group", team1:"BEL", team2:"EGY", labelDe:"Gruppe G", labelEn:"Group G", date:"15.06.2026", time:"21:00" },
        { id:"match_26", type:"group", team1:"IRN", team2:"NZL", labelDe:"Gruppe G", labelEn:"Group G", date:"16.06.2026", time:"03:00" },
        { id:"match_27", type:"group", team1:"BEL", team2:"IRN", labelDe:"Gruppe G", labelEn:"Group G", date:"21.06.2026", time:"21:00" },
        { id:"match_28", type:"group", team1:"NZL", team2:"EGY", labelDe:"Gruppe G", labelEn:"Group G", date:"22.06.2026", time:"03:00" },
        { id:"match_29", type:"group", team1:"ESP", team2:"CPV", labelDe:"Gruppe H", labelEn:"Group H", date:"15.06.2026", time:"18:00" },
        { id:"match_30", type:"group", team1:"KSA", team2:"URU", labelDe:"Gruppe H", labelEn:"Group H", date:"16.06.2026", time:"00:00" },
        { id:"match_31", type:"group", team1:"ESP", team2:"KSA", labelDe:"Gruppe H", labelEn:"Group H", date:"21.06.2026", time:"18:00" },
        { id:"match_32", type:"group", team1:"URU", team2:"CPV", labelDe:"Gruppe H", labelEn:"Group H", date:"22.06.2026", time:"00:00" }
    ];

    const restTeams = ["FRA", "SEN", "IRQ", "NOR", "ARG", "ALG", "AUT", "JOR", "POR", "COD", "UZB", "COL", "ENG", "CRO", "GHA", "PAN"];
    for (let i = 33; i <= 72; i++) {
        let index1 = (i - 33) % restTeams.length;
        let index2 = (i - 32) % restTeams.length;
        matches.push({
            id: `match_${i}`, type: "group", team1: restTeams[index1], team2: restTeams[index2],
            labelDe: `Hauptrunde - Spiel ${i}`, labelEn: `Group Stage - Match ${i}`,
            date: `${15 + Math.floor((i - 33) / 4)}.06.2026`, time: i % 2 === 0 ? "18:00" : "21:00"
        });
    }

    function getUserTips() {
        return JSON.parse(localStorage.getItem('wc_backup_tips_' + currentUser)) || {};
    }

    function saveLocalTip(matchId, side, value) {
        if (!currentUser) return;
        const key = 'wc_backup_tips_' + currentUser;
        const cache = JSON.parse(localStorage.getItem(key)) || {};
        if (!cache[matchId]) cache[matchId] = { home: '', away: '' };
        cache[matchId][side] = (value !== '') ? parseInt(value) : '';
        localStorage.setItem(key, JSON.stringify(cache));
    }

    function switchLang(lang) {
        currentLang = lang;
        localStorage.setItem('wc_lang', lang);
        document.getElementById('btn-de').className = `px-2 py-1 rounded text-xs font-bold ${lang==='de' ? 'bg-amber-500 text-black' : 'bg-slate-700 text-white'}`;
        document.getElementById('btn-en').className = `px-2 py-1 rounded text-xs font-bold ${lang==='en' ? 'bg-amber-500 text-black' : 'bg-slate-700 text-white'}`;
        document.getElementById('label-player').textContent = lang === 'de' ? 'Spieler' : 'Player';
        document.getElementById('setup-title').textContent = lang === 'de' ? 'Willkommen zum Familien-Tippspiel!' : 'Welcome to the Family Predictor!';
        document.getElementById('setup-desc').textContent = lang === 'de' ? 'Bitte gib deinen Namen ein.' : 'Please enter your name.';
        document.getElementById('setup-btn').textContent = lang === 'de' ? 'Starten' : 'Start';
        renderMatches();
    }

    function showTab(tabId) {
        renderMatches();
    }

    function renderMatches() {
        const container = document.getElementById('matches-container');
        if (!container) return;
        container.innerHTML = '';
        const userTips = getUserTips();

        matches.forEach(m => {
            const tip = userTips[m.id] || { home: '', away: '' };
            const label = currentLang === 'de' ? m.labelDe : m.labelEn;

            container.innerHTML += `
                <div class="bg-[#111827] border border-slate-800 rounded-xl p-4 flex flex-col md:flex-row items-center justify-between gap-4 shadow-sm">
                    <div class="flex flex-col items-center md:items-start w-full md:w-auto">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="text-xs text-amber-500 font-mono tracking-wider">${label}</span>
                            <span class="text-[10px] bg-slate-900 border border-slate-800 text-gray-400 px-1.5 py-0.5 rounded font-mono">📅 ${m.date} - ${m.time}</span>
                        </div>
                        <div class="flex items-center gap-3 mt-2 flex-wrap justify-center md:justify-start">
                            <span class="font-bold text-base text-gray-100 tracking-wide">${getTeamName(m.team1)}</span>
                            <span class="text-xs text-gray-500 px-1 font-serif">vs</span>
                            <span class="font-bold text-base text-gray-100 tracking-wide">${getTeamName(m.team2)}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <input type="number" min="0" max="99" id="tip-${m.id}-home" value="${tip.home !== '' && tip.home != null ? tip.home : ''}" oninput="saveLocalTip('${m.id}', 'home', this.value)" class="w-12 bg-slate-900 border border-slate-700 rounded-lg py-1 text-center font-bold text-white focus:border-amber-400 focus:outline-none" placeholder="-">
                        <span class="text-gray-600">:</span>
                        <input type="number" min="0" max="99" id="tip-${m.id}-away" value="${tip.away !== '' && tip.away != null ? tip.away : ''}" oninput="saveLocalTip('${m.id}', 'away', this.value)" class="w-12 bg-slate-900 border border-slate-700 rounded-lg py-1 text-center font-bold text-white focus:border-amber-400 focus:outline-none" placeholder="-">
                    </div>
                </div>`;
        });
    }

    // Versand-Option 1: Generiert eine CSV-Struktur und öffnet den E-Mail-Client
    function exportAsCSV() {
        if (!currentUser) { alert("Bitte trag zuerst deinen Namen ein!"); return; }
        const userTips = getUserTips();
        
        let csvContent = "Spieler;SpielID;HeimTeam;GastTeam;TippHeim;TippGast\n";
        let hasTips = false;

        matches.forEach(m => {
            const tip = userTips[m.id];
            if (tip && (tip.home !== '' || tip.away !== '')) {
                csvContent += `${currentUser};${m.id};${m.team1};${m.team2};${tip.home};${tip.away}\n`;
                hasTips = true;
            }
        });

        if (!hasTips) { alert("Du hast noch keine Tipps eingegeben!"); return; }

        const subject = encodeURIComponent(`WM Tippspiel 2026 - Tipps von ${currentUser}`);
        const body = encodeURIComponent(`Hallo,\n\nhier sind meine WM-Tipps.\n\nKopiere den folgenden Textblock in eine CSV-Datei oder lies ihn ein:\n\n${csvContent}`);
        
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    // Versand-Option 2: Formatiert kompakten Text und kopiert ihn in die Zwischenablage für WhatsApp & Co.
    function exportAsMessenger() {
        if (!currentUser) { alert("Bitte trag zuerst deinen Namen ein!"); return; }
        const userTips = getUserTips();
        
        let textLine = `🏆 Tipps von ${currentUser}:\n`;
        let hasTips = false;

        matches.forEach(m => {
            const tip = userTips[m.id];
            if (tip && tip.home !== '' && tip.away !== '') {
                textLine += `${m.id.replace('match_', '')}. ${m.team1}-${m.team2} [${tip.home}:${tip.away}]\n`;
                hasTips = true;
            }
        });

        if (!hasTips) { alert("Du hast noch keine Tipps eingegeben!"); return; }

        navigator.clipboard.writeText(textLine).then(() => {
            alert("📋 Tippzettel erfolgreich kopiert! Du kannst jetzt WhatsApp oder einen anderen Messenger öffnen und den Text einfach mit 'Einfügen' abschicken.");
        }).catch(() => {
            alert("Fehler beim Kopieren. Bitte markiere den Text manuell.");
        });
    }

    function saveUsername() {
        const input = document.getElementById('username-input').value.trim();
        if (!input) return;
        currentUser = input;
        localStorage.setItem('wc_user', currentUser);
        document.getElementById('player-name-display').textContent = currentUser;
        document.getElementById('setup-section').classList.add('hidden');
        renderMatches();
    }

    window.addEventListener('DOMContentLoaded', () => {
        if (currentUser) {
            document.getElementById('player-name-display').textContent = currentUser;
            document.getElementById('setup-section').classList.add('hidden');
        } else {
            document.getElementById('setup-section').classList.remove('hidden');
        }
        switchLang(currentLang);
    });
    </script>
</body>
</html>
