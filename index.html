<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Predictor | WM Tippspiel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0c1020;
            color: #f3f4f6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="bg-[#0a192f] border-b border-[#d4af37]/30 p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-200 tracking-wider uppercase">
                🏆 World Cup 2026
            </h1>
            <div class="flex items-center gap-3">
                <button onclick="switchLang('de')" id="btn-de" class="px-2 py-1 rounded text-xs font-bold bg-amber-500 text-black">DE</button>
                <button onclick="switchLang('en')" id="btn-en" class="px-2 py-1 rounded text-xs font-bold bg-slate-700 text-white">EN</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl w-full mx-auto p-4 flex-grow">
        
        <div id="loading-overlay" class="fixed inset-0 bg-black/80 flex flex-col items-center justify-center z-50 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-amber-400 mb-4"></div>
            <p class="text-sm font-mono text-amber-400">Verbindung zur Datenbank... / Connecting...</p>
        </div>

        <section id="setup-section" class="bg-[#111827] border border-slate-800 rounded-2xl p-6 mb-6 shadow-xl hidden">
            <h2 class="text-2xl font-semibold mb-2 text-amber-400 data-lang" data-de="Willkommen zum Familien-Tippspiel!" data-en="Welcome to the Family Predictor!"></h2>
            <p class="text-sm text-gray-400 mb-4 data-lang" data-de="Bitte gib deinen Namen ein. Deine Tipps werden zentral bei Sebastian Morgan gespeichert." data-en="Please enter your name. Your predictions will be stored centrally with Sebastian Morgan."></p>
            <div class="flex gap-2">
                <input type="text" id="username-input" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white w-full focus:outline-none focus:border-amber-400" placeholder="z.B. Opa Heinz / e.g. Uncle Bob">
                <button onclick="saveUsername()" class="bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-bold px-6 py-3 rounded-xl transition data-lang" data-de="Starten" data-en="Start"></button>
            </div>
        </section>

        <section id="dashboard-section" class="hidden">
            <div class="bg-[#111827] border border-slate-800 rounded-2xl p-4 mb-6 flex flex-wrap justify-between items-center gap-4 shadow-xl">
                <div>
                    <span class="text-xs text-gray-400 block uppercase tracking-wider data-lang" data-de="Spieler" data-en="Player"></span>
                    <span id="player-name-display" class="text-xl font-bold text-white"></span>
                </div>
                <div class="flex gap-2">
                    <button onclick="showTab('tab-matches')" class="px-4 py-2 rounded-xl text-sm font-bold bg-amber-500 text-slate-950" id="nav-matches" data-lang data-de="⚽ Tipps" data-en="⚽ Predictions"></button>
                    <button onclick="showTab('tab-ranking')" class="px-4 py-2 rounded-xl text-sm font-medium bg-slate-800 text-gray-300" id="nav-ranking" data-lang data-de="📊 Ranking" data-en="📊 Ranking"></button>
                    <button onclick="showTab('tab-admin')" id="nav-admin" class="px-4 py-2 rounded-xl text-sm font-medium bg-red-950 text-red-200 hidden">⚙️ Admin</button>
                </div>
            </div>

            <div id="tab-matches" class="tab-content space-y-6">
                <div class="flex gap-2 overflow-x-auto pb-2 border-b border-slate-800">
                    <button onclick="filterPhase('group')" id="phase-group" class="border border-amber-500/50 bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium shrink-0 data-lang" data-de="Hauptrunde (72 Spiele)" data-en="Group Stage (72 Matches)"></button>
                    <button onclick="filterPhase('ko')" id="phase-ko" class="opacity-50 pointer-events-none border border-slate-700 text-gray-400 px-4 py-2 rounded-lg text-sm font-medium shrink-0 data-lang" data-de="🔒 Endrunde" data-en="🔒 Knockout Stage"></button>
                </div>

                <div id="matches-container" class="space-y-3"></div>

                <div class="text-center pt-4">
                    <button onclick="saveUserTipsServer()" class="bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white font-bold px-8 py-4 rounded-xl shadow-lg transition w-full md:w-auto data-lang" data-de="💾 Tipps abschicken" data-en="💾 Submit Predictions"></button>
                </div>
            </div>

            <div id="tab-ranking" class="tab-content hidden">
                <div class="bg-[#111827] border border-slate-800 rounded-2xl p-6 shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold text-amber-400 data-lang" data-de="🏆 Live-Rangliste" data-en="🏆 Live Leaderboard"></h3>
                        <button onclick="loadDataFromServer()" class="text-xs bg-slate-800 hover:bg-slate-700 text-gray-300 px-3 py-1 rounded-lg transition data-lang" data-de="🔄 Aktualisieren" data-en="🔄 Refresh"></button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-800 text-gray-400 text-sm">
                                    <th class="py-3 px-2 w-12 text-center">#</th>
                                    <th class="py-3 px-4 data-lang" data-de="Name" data-en="Name"></th>
                                    <th class="py-3 px-4 text-center data-lang" data-de="Punkte" data-en="Points"></th>
                                </tr>
                            </thead>
                            <tbody id="ranking-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tab-admin" class="tab-content hidden space-y-4">
                <div class="bg-red-950/20 border border-red-900/50 rounded-2xl p-6 shadow-xl">
                    <h3 class="text-xl font-bold mb-2 text-red-400">Admin-Zentrale</h3>
                    <div class="mb-4 flex items-center justify-between bg-slate-900 p-3 rounded-xl border border-slate-800">
                        <span class="text-sm text-gray-300">Status Endrunde:</span>
                        <button onclick="toggleEndrundeAdmin()" id="admin-ko-status-btn" class="bg-red-700 text-white text-xs px-3 py-2 rounded-lg font-bold">Gesperrt</button>
                    </div>
                    <div id="admin-matches-container" class="space-y-2 max-h-96 overflow-y-auto pr-2"></div>
                    <button onclick="saveAdminResultsServer()" class="mt-4 bg-gradient-to-r from-red-700 to-red-600 text-white font-bold px-4 py-3 rounded-xl w-full shadow-lg">Echte Ergebnisse bei mir speichern</button>
                </div>
            </div>
        </section>
    </main>
