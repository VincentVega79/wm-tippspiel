            showLoading(true, "Synchronisiere Live-Daten mit Supabase...");
            try {
                // 1. Tipps holen
                let rTipps = await fetch(`${SUPABASE_URL}/rest/v1/tipps?select=id,player_name,predictions`, {

                renderMatches(); 
                renderRanking();
                renderAdminMatches();
            } catch (e) {
                console.warn("Netzwerkfehler abgefangen. Interface läuft stabil lokal weiter.", e);
            }
            showLoading(false);
        }

        // BOMBENFESTER UPSERT-BEFEHL (PostgREST-Array-Standard)
        async function saveUserTipsServer() {
            if(!currentUser) {
                alert("Bitte trage zuerst deinen Namen ein!");
                return;
            }
            showLoading(true, "Speichere Tipps in Supabase Cloud...");
            let predictions = JSON.parse(localStorage.getItem('wc_backup_tips_' + currentUser)) || serverData.allPlayersData[currentUser] || {}; 

            let existingId = playerRowIds[currentUser];
            let url = `${SUPABASE_URL}/rest/v1/tipps`;
            let method = "POST";
            let headers = { 
                "apikey": SUPABASE_KEY, 
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json"
            };
            
            let bodyData = { player_name: currentUser, predictions: predictions };

            if (existingId) {
                url += `?id=eq.${existingId}`;
                method = "PATCH";
            } else {
                bodyData.id = Math.floor(Math.random() * 10000000) + 1;
            }

            try {
                // Supabase verlangt bei POST ein JSON-Array in eckigen Klammern [ ... ]
                let finalBody = method === "POST" ? [bodyData] : bodyData;

                let response = await fetch(url, {
                    method: method,
                    headers: headers,
                    body: JSON.stringify(finalBody)
                });
                
                if (!response.ok) {
                    throw new Error("HTTP Fehler: " + response.status);
                }
                
                alert(currentLang === 'de' ? "🎉 Deine Tipps wurden live in Supabase gesichert!" : "🎉 Predictions saved!");
                await loadDataFromServer();
            } catch (err) {
                console.error(err);
                alert("Übertragungsfehler. Tipps sind lokal im Browser gesichert.");
            }
            showLoading(false);
        }

        function switchLang(lang) {
            currentLang = lang; 
            localStorage.setItem('wc_lang', lang);
            document.querySelectorAll('.data-lang').forEach(el => {
                const translation = el.getAttribute(`data-${lang}`);
                if (translation) el.innerText = translation;
            });
            const btnDe = document.getElementById('btn-de'); const btnEn = document.getElementById('btn-en');
            if(btnDe && btnEn) {
                btnDe.className = lang === 'de' ? "px-2 py-1 rounded text-xs font-bold bg-amber-500 text-black" : "px-2 py-1 rounded text-xs font-bold bg-slate-700 text-white";
                btnEn.className = lang === 'en' ? "px-2 py-1 rounded text-xs font-bold bg-amber-500 text-black" : "px-2 py-1 rounded text-xs font-bold bg-slate-700 text-white";
            }
            renderMatches(); renderRanking();
        }

            const input = document.getElementById('username-input').value.trim();
            if(input) {
                currentUser = input; localStorage.setItem('wc_user', currentUser);
                document.getElementById('player-name-display').innerText = currentUser;
                document.getElementById('setup-section').classList.add('hidden');
                renderMatches(); loadDataFromServer();
            }
        }

        function showTab(tabId) {
            const isCurrentlyAdmin = checkAdminPermission();
            if (tabId === 'tab-admin' && !isCurrentlyAdmin) tabId = 'tab-matches';
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            const activeTab = document.getElementById(tabId);
            if (activeTab) activeTab.classList.remove('hidden');
            const btnMatches = document.getElementById('nav-matches'); const btnRanking = document.getElementById('nav-ranking'); const btnAdmin = document.getElementById('nav-admin');
            if(btnMatches) btnMatches.className = "px-4 py-2 rounded-xl text-sm font-medium bg-slate-800 text-gray-300 transition-all";
            if(btnRanking) btnRanking.className = "px-4 py-2 rounded-xl text-sm font-medium bg-slate-800 text-gray-300 transition-all";
            if(btnAdmin) btnAdmin.className = "px-4 py-2 rounded-xl text-sm font-medium bg-red-950 text-red-200 transition-all";
            if (tabId === 'tab-matches' && btnMatches) btnMatches.className = "px-4 py-2 rounded-xl text-sm font-bold bg-amber-500 text-slate-950 transition-all";
            else if (tabId === 'tab-ranking' && btnRanking) btnRanking.className = "px-4 py-2 rounded-xl text-sm font-bold bg-amber-500 text-slate-950 transition-all";
            else if (tabId === 'tab-admin' && btnAdmin && isCurrentlyAdmin) btnAdmin.className = "px-4 py-2 rounded-xl text-sm font-bold bg-amber-500 text-slate-950 transition-all";
        }

        function updateUIPhases() {
            const btnKo = document.getElementById('phase-ko'); const adminBtn = document.getElementById('admin-ko-status-btn');
            if(!btnKo) return;
            if(serverData.endrundeFreigeschaltet) {
                btnKo.classList.remove('opacity-50', 'pointer-events-none'); btnKo.innerText = currentLang === 'de' ? "🔥 Endrunde" : "🔥 Knockout Stage";
                if(adminBtn) { adminBtn.innerText = "Freigeschaltet"; adminBtn.className = "bg-emerald-600 text-white text-xs px-3 py-2 rounded-lg font-bold"; }
            } else {
                btnKo.classList.add('opacity-50', 'pointer-events-none'); btnKo.innerText = currentLang === 'de' ? "🔒 Endrunde" : "🔒 Knockout";
                if(adminBtn) { adminBtn.innerText = "Gesperrt"; adminBtn.className = "bg-red-700 text-white text-xs px-3 py-2 rounded-lg font-bold"; }
            }
        }

        function filterPhase(phase) {
            currentFilterPhase = phase;
            const btnGroup = document.getElementById('phase-group'); const btnKo = document.getElementById('phase-ko');
            if(btnGroup && btnKo) {
                btnGroup.className = phase === 'group' ? "border border-amber-500/50 bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium shrink-0" : "border border-slate-700 text-gray-400 px-4 py-2 rounded-lg text-sm font-medium shrink-0";
                btnKo.className = phase === 'ko' ? "border border-amber-500/50 bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium shrink-0" : "border border-slate-700 text-gray-400 px-4 py-2 rounded-lg text-sm font-medium shrink-0";
            }
            renderMatches();
        }

        function renderMatches() {
            const container = document.getElementById('matches-container'); if(!container) return;
            container.innerHTML = '';
            const myPreds = serverData.allPlayersData[currentUser] || JSON.parse(localStorage.getItem('wc_backup_tips_' + currentUser)) || {};
            matches.filter(m => m.type === currentFilterPhase).forEach(m => {
                const userTip = myPreds[m.id] || { home: '', away: '' }; const realResult = serverData.echteErgebnisse[m.id]; let badge = '';
                if (realResult) {
                    const pts = calculatePoints(userTip.home, userTip.away, realResult.home, realResult.away);
                    badge = `<span class="text-xs px-2 py-1 rounded-md font-bold ${pts===2?'bg-emerald-500 text-white':(pts===1?'bg-amber-500 text-black':'bg-red-500/20 text-red-400')}">${realResult.home}:${realResult.away} (${pts} Pts)</span>`;
                }
                container.innerHTML += `
                    <div class="bg-[#111827] border border-slate-800 rounded-xl p-4 flex flex-col md:flex-row items-center justify-between gap-4 shadow-sm">
                        <div class="flex flex-col items-center md:items-start w-full md:w-auto">
                            <div class="flex items-center gap-2 flex-wrap"><span class="text-xs text-amber-500 font-mono tracking-wider">${currentLang==='de'?m.labelDe:m.labelEn}</span><span class="text-[10px] bg-slate-900 border border-slate-800 text-gray-400 px-1.5 py-0.5 rounded font-mono">📅 ${m.date} - ${m.time}</span></div>
                            <div class="flex items-center gap-3 mt-2 flex-wrap justify-center md:justify-start"><span class="font-bold text-base text-gray-100 tracking-wide">${getTeamName(m.team1)}</span><span class="text-xs text-gray-500 px-1 font-serif">vs</span><span class="font-bold text-base text-gray-100 tracking-wide">${getTeamName(m.team2)}</span></div>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            ${badge}
                            <input type="number" id="tip-${m.id}-home" value="${userTip.home}" oninput="trackLocalChange('${m.id}', 'home', this.value)" class="w-12 bg-slate-900 border border-slate-700 rounded-lg py-1 text-center font-bold text-white focus:border-amber-400 focus:outline-none" placeholder="-">
                            <span class="text-gray-600">:</span>
                            <input type="number" id="tip-${m.id}-away" value="${userTip.away}" oninput="trackLocalChange('${m.id}', 'away', this.value)" class="w-12 bg-slate-900 border border-slate-700 rounded-lg py-1 text-center font-bold text-white focus:border-amber-400 focus:outline-none" placeholder="-">
                        </div>
                    </div>`;
            });
        }

        function renderRanking() {
            const tbody = document.getElementById('ranking-table-body'); const msg = document.getElementById('no-players-msg');
            if(!tbody) return; tbody.innerHTML = ''; let leaderboard = [];
            Object.keys(serverData.allPlayersData).forEach(pName => {
                let pts = 0; const preds = serverData.allPlayersData[pName];
                Object.keys(preds).forEach(mId => {
                    const real = serverData.echteErgebnisse[mId];
                    if(real) pts += calculatePoints(preds[mId].home, preds[mId].away, real.home, real.away);
                });
                leaderboard.push({ name: pName, points: pts });
            });
            if (currentUser && !serverData.allPlayersData[currentUser]) {
                if (!leaderboard.some(p => p.name === currentUser)) leaderboard.push({ name: currentUser, points: 0 });
            }
            if(leaderboard.length === 0) { if(msg) msg.classList.remove('hidden'); return; } else { if(msg) msg.classList.add('hidden'); }
            leaderboard.sort((a,b) => b.points - a.points);
            leaderboard.forEach((p, idx) => {
                tbody.innerHTML += `
                    <tr class="border-b border-slate-800 text-sm hover:bg-slate-900/50 w-full flex justify-between">
                        <td class="py-3 px-4 font-bold w-16 text-center ${idx===0?'text-amber-400':''}">${idx + 1}</td>
                        <td class="py-3 px-4 font-medium flex-grow text-left">${p.name} ${p.name===currentUser?'(Du/You)':''}</td>
                        <td class="py-3 px-4 font-bold text-emerald-400 w-24 text-center">${p.points} Pts</td>
                    </tr>`;
            });
        }

        function renderAdminMatches() {
            const container = document.getElementById('admin-matches-container'); if(!container) return; container.innerHTML = '';
            matches.forEach(m => {
                const res = serverData.echteErgebnisse[m.id] || { home: '', away: '' };
                container.innerHTML += `
                    <div class="bg-slate-900 p-2 rounded flex justify-between items-center text-xs border border-slate-800">
                        <span>${m.id.toUpperCase()} - ${getTeamName(m.team1)} vs ${getTeamName(m.team2)} (${m.date})</span>
                        <div class="flex gap-1"><input type="number" id="admin-${m.id}-home" value="${res.home}" class="w-8 bg-black text-center text-amber-400"><span>:</span><input type="number" id="admin-${m.id}-away" value="${res.away}" class="w-8 bg-black text-center text-amber-400"></div>
                    </div>`;
            });
        }

        function toggleEndrundeAdmin() { serverData.endrundeFreigeschaltet = !serverData.endrundeFreigeschaltet; updateUIPhases(); }

        async function saveAdminResultsServer() {
            showLoading(true, "Speichere offizielle Ergebnisse...");
            let echte = {};
            matches.forEach(m => {
                const h = document.getElementById(`admin-${m.id}-home`).value; const a = document.getElementById(`admin-${m.id}-away`).value;
                if(h !== '' && a !== '') echte[m.id] = { home: parseInt(h), away: parseInt(a) };
            });

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/admin_data?id=eq.1`, {
                    method: "PATCH",
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ echte_ergebnisse: echte, endrunde_freigeschaltet: serverData.endrundeFreigeschaltet })
                });
                alert("Admin-Daten erfolgreich in Supabase gespeichert!");
                await loadDataFromServer();
            } catch (e) {
                console.error(e);
            }
            showLoading(false);
        }
    </script>
</body>
</html>
